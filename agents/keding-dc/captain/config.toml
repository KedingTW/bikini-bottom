[discord]
bot_token = "${DISCORD_BOT_TOKEN}"
allowed_channels = ["1515997514904633384"]
trusted_bot_ids = ["1516011013223354428", "1516011372947701911"]
allow_bot_messages = "mentions"
allow_user_messages = "mentions"
max_bot_turns = 100

[agent]
command = "kiro-cli"
args = ["acp", "--trust-all-tools"]
working_dir = "/home/agent/workspace"
env = { KIRO_API_KEY = "${KIRO_API_KEY}" }
inherit_env = ["GIT_AUTHOR_NAME", "GIT_COMMITTER_NAME", "GIT_AUTHOR_EMAIL", "GIT_COMMITTER_EMAIL", "KIRO_API_KEY"]

[pool]
max_sessions = 15
session_ttl_hours = 24

[reactions]
enabled = true
remove_after_reply = false

[reactions.emojis]
queued = "👀"
thinking = "🛡️"
tool = "⭐"
coding = "📋"
web = "🌐"
done = "🆗"
error = "💥"

[reactions.timing]
debounce_ms = 700
stall_soft_ms = 10000
stall_hard_ms = 30000
done_hold_ms = 1500
error_hold_ms = 2500
