2. 取第一支 videoId：
   a. 讀 /shared/workspace/video-digest/videos/{videoId}/summary.md 和 meta.json
   b. 用 UploadWecomMedia（appName: "als", filePath: AddBrandFrame 的容器路徑, type: "image"）取得 thumbMediaId。容器路徑從 meta.json 的 illustrationBrandedUrl 取得，把 url decode 後取 filePath 參數值
   c. 用 UploadWecomImage（appName: "als", filePath: 同上）取得內嵌圖片 url
