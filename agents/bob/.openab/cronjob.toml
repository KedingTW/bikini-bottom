   e. 呼叫 PushWecomMpnews（appName: "als", title, content, thumbMediaId, contentSourceUrl: meta.json 的 youtubeUrl）
   f. 從 pending-push.json 移除該 videoId，加入 pushed.json
   g. 更新 meta.json 的 pushedAt 和 status
3. 回報：「Push: 已推播 {videoId}」
⚠️ 禁止修改 cronjob.toml 或停用任何排程。"""

