apiVersion: apps/v1
kind: Deployment
metadata:
  name: larry
  namespace: bikini-bottom
  labels:
    app: larry
    type: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: larry
  template:
    metadata:
      labels:
        app: larry
        type: agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: bikini-bottom/agent:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: channel-ids
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-tokens
                  key: LARRY
            - name: KIRO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kiro-api-keys
                  key: LARRY
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GH_TOKEN
            - name: GIT_AUTHOR_NAME
              value: "蝦霸 (Larry)"
            - name: GIT_COMMITTER_NAME
              value: "蝦霸 (Larry)"
            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: GIT_COMMITTER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: AGENT_NAME
              value: "larry"
            - name: AGENT_SKILLS
              value: "xlsx,pdf,pptx,docx,doc-coauthoring,company-kb"
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
          volumeMounts:
            - name: config
              mountPath: /etc/openab/config.toml
              readOnly: true
            - name: agent-home
              mountPath: /home/agent
            - name: nas
              mountPath: /nas
            - name: shared-steering
              mountPath: /opt/steering
              readOnly: true
            - name: shared-skills
              mountPath: /opt/skills
              readOnly: true
      volumes:
        - name: config
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/bikini-bottom/larry/config.toml
            type: File
        - name: agent-home
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/bikini-bottom/larry
            type: Directory
        - name: nas
          persistentVolumeClaim:
            claimName: nas-pvc
        - name: shared-steering
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/steering
            type: Directory
        - name: shared-skills
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/skills
            type: Directory
