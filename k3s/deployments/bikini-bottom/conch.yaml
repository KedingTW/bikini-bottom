apiVersion: apps/v1
kind: Deployment
metadata:
  name: conch
  namespace: bikini-bottom
  labels:
    app: conch
    type: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conch
  template:
    metadata:
      labels:
        app: conch
        type: agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: bikini-bottom/agent:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: channel-ids
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-tokens
                  key: CONCH
            - name: KIRO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kiro-api-keys
                  key: CONCH
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GH_TOKEN
            - name: GIT_AUTHOR_NAME
              value: "神奇海螺 (Magic Conch)"
            - name: GIT_COMMITTER_NAME
              value: "神奇海螺 (Magic Conch)"
            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: GIT_COMMITTER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: AGENT_NAME
              value: "conch"
            - name: AGENT_SKILLS
              value: "company-kb"
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
          volumeMounts:
            - name: config
              mountPath: /etc/openab/config.toml
              readOnly: true
            - name: agent-home
              mountPath: /home/agent
            - name: kd-dev
              mountPath: /mnt/kd-dev
            - name: shared-steering
              mountPath: /opt/steering
              readOnly: true
            - name: shared-skills
              mountPath: /opt/skills
              readOnly: true
      volumes:
        - name: config
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/bikini-bottom/conch/config.toml
            type: File
        - name: agent-home
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/bikini-bottom/conch
            type: Directory
        - name: kd-dev
          hostPath:
            path: /mnt/kd-dev
            type: Directory
        - name: shared-steering
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/bikini-bottom/steering
            type: Directory
        - name: shared-skills
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/skills
            type: Directory
