apiVersion: apps/v1
kind: Deployment
metadata:
  name: patrick
  namespace: bikini-bottom
  labels:
    app: patrick
    type: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patrick
  template:
    metadata:
      labels:
        app: patrick
        type: agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        supplementalGroups: [1002]
      containers:
        - name: agent
          image: bikini-bottom/agent:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: channel-ids
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-tokens
                  key: PATRICK
            - name: KIRO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kiro-api-keys
                  key: PATRICK
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GH_TOKEN
            - name: GIT_AUTHOR_NAME
              value: "派大星 (Patrick)"
            - name: GIT_COMMITTER_NAME
              value: "派大星 (Patrick)"
            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: GIT_COMMITTER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: AGENT_NAME
              value: "patrick"
            - name: AGENT_SKILLS
              value: "xlsx,pdf,pptx,docx,doc-coauthoring,company-kb"
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
          volumeMounts:
            - name: config
              mountPath: /etc/openab/config.toml
              readOnly: true
            - name: home
              mountPath: /home/agent
            - name: workspace
              mountPath: /home/agent/workspace
            - name: shared-workspace
              mountPath: /shared/workspace
            - name: shared-steering
              mountPath: /opt/steering
              readOnly: true
            - name: shared-skills
              mountPath: /opt/skills
              readOnly: true
      volumes:
        - name: config
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/bikini-bottom/patrick/config.toml
            type: File
        - name: home
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/bikini-bottom/patrick
            type: Directory
        - name: workspace
          hostPath:
            path: /mnt/kd-dev/agents/patrick
            type: Directory
        - name: shared-workspace
          hostPath:
            path: /mnt/kd-dev/shared/workspace
            type: Directory
        - name: shared-steering
          hostPath:
            path: /mnt/kd-dev/shared/steering
            type: Directory
        - name: shared-skills
          hostPath:
            path: /mnt/kd-dev/shared/skills
            type: Directory
