apiVersion: apps/v1
kind: Deployment
metadata:
  name: wecom-bot
  namespace: bikini-bottom
  labels:
    app: wecom-bot
    type: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wecom-bot
  template:
    metadata:
      labels:
        app: wecom-bot
        type: agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: bikini-bottom/agent:latest
          imagePullPolicy: Never
          env:
            - name: KIRO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kiro-api-keys
                  key: WECOM_BOT
            - name: GIT_AUTHOR_NAME
              value: "WeCom Bot"
            - name: GIT_COMMITTER_NAME
              value: "WeCom Bot"
            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: GIT_COMMITTER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
          volumeMounts:
            - name: config
              mountPath: /etc/openab/config.toml
              readOnly: true
            - name: agent-home
              mountPath: /home/agent
      volumes:
        - name: config
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/wecom-bot/config.toml
            type: File
        - name: agent-home
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/wecom-bot
            type: Directory
