apiVersion: apps/v1
kind: Deployment
metadata:
  name: keding-dc-ironman
  namespace: bikini-bottom
  labels:
    app: keding-dc-ironman
    group: keding-dc
    type: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keding-dc-ironman
  template:
    metadata:
      labels:
        app: keding-dc-ironman
        group: keding-dc
        type: agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: agent
        image: keding-dc/agent:latest
        imagePullPolicy: Never
        command: ["/usr/local/bin/entrypoint-keding-dc.sh"]
        env:
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: keding-dc-secrets
              key: IRONMAN_BOT_TOKEN
        - name: KIRO_API_KEY
          valueFrom:
            secretKeyRef:
              name: keding-dc-secrets
              key: IRONMAN_KIRO_KEY
        - name: AGENT_NAME
          value: keding-dc-ironman
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 768Mi
        volumeMounts:
        - name: config
          mountPath: /etc/openab/config.toml
          readOnly: true
        - name: agent-home
          mountPath: /home/agent
        - name: kd-dc
          mountPath: /mnt/kd-dc
        - name: kd-share
          mountPath: /mnt/kd-share
          readOnly: true
        - name: shared-skills
          mountPath: /home/kdprogramer/Projects/bikini-bottom/shared/skills
          readOnly: true
      volumes:
      - name: config
        hostPath:
          path: /home/kdprogramer/Projects/bikini-bottom/agents/keding-dc/ironman/config.toml
          type: File
      - name: agent-home
        hostPath:
          path: /home/kdprogramer/Projects/bikini-bottom/agents/keding-dc/ironman
          type: Directory
      - name: kd-dc
        hostPath:
          path: /mnt/kd-dc
          type: Directory
      - name: kd-share
        hostPath:
          path: /mnt/kd-share
          type: Directory
      - name: shared-skills
        hostPath:
          path: /home/kdprogramer/Projects/bikini-bottom/shared/skills
          type: Directory
