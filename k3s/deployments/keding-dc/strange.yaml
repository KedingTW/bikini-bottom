apiVersion: apps/v1
kind: Deployment
metadata:
  name: keding-dc-strange
  namespace: bikini-bottom
  labels:
    app: keding-dc-strange
    type: agent
    group: keding-dc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keding-dc-strange
  template:
    metadata:
      labels:
        app: keding-dc-strange
        type: agent
        group: keding-dc
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: keding-dc/agent:latest
          imagePullPolicy: Never
          command: ["/usr/local/bin/entrypoint-keding-dc.sh"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: keding-dc-secrets
                  key: STRANGE_BOT_TOKEN
            - name: KIRO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: keding-dc-secrets
                  key: STRANGE_KIRO_KEY
            - name: GIT_AUTHOR_NAME
              value: "Dr Strange Bot"
            - name: GIT_COMMITTER_NAME
              value: "Dr Strange Bot"
            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: GIT_COMMITTER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: AGENT_NAME
              value: "keding-dc-strange"
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /etc/openab/config.toml
              readOnly: true
            - name: agent-home
              mountPath: /home/agent
            - name: kd-dc
              mountPath: /mnt/kd-dc
            - name: kd-share
              mountPath: /mnt/kd-share
              readOnly: true
            - name: shared-skills
              mountPath: /opt/skills
              readOnly: true
      volumes:
        - name: config
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/keding-dc/strange/config.toml
            type: File
        - name: agent-home
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/keding-dc/strange
            type: Directory
        - name: kd-dc
          hostPath:
            path: /mnt/kd-dc
            type: Directory
        - name: kd-share
          hostPath:
            path: /mnt/kd-share
            type: Directory
        - name: shared-skills
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/skills
            type: Directory
