apiVersion: apps/v1
kind: Deployment
metadata:
  name: wecom-bot-order-transform
  namespace: bikini-bottom
  labels:
    app: wecom-bot-order-transform
    type: agent
    bot-platform: wecom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wecom-bot-order-transform
  template:
    metadata:
      labels:
        app: wecom-bot-order-transform
        type: agent
        bot-platform: wecom
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /home/agent"]
          volumeMounts:
            - name: agent-home
              mountPath: /home/agent
      containers:
        - name: agent
          image: bikini-bottom/agent:latest
          imagePullPolicy: Never
          env:
            - name: KIRO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kiro-api-keys
                  key: WECOM_BOT_ORDER_TRANSFORM
            - name: GIT_AUTHOR_NAME
              value: "WeCom Bot Order"
            - name: GIT_COMMITTER_NAME
              value: "WeCom Bot Order"
            - name: GIT_AUTHOR_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: GIT_COMMITTER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: common-env
                  key: GIT_EMAIL
            - name: AGENT_NAME
              value: "wecom-bot-order-transform"
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /etc/openab/config.toml
              readOnly: true
            - name: agent-home
              mountPath: /home/agent
            - name: shared-steering
              mountPath: /opt/steering
              readOnly: true
            - name: shared-skills
              mountPath: /opt/skills
              readOnly: true
      volumes:
        - name: config
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/keding-wecom/order-transform/config.toml
            type: File
        - name: agent-home
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents/keding-wecom/order-transform
            type: Directory
        - name: shared-steering
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/steering
            type: Directory
        - name: shared-skills
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/skills
            type: Directory
