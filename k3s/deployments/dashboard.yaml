apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: bikini-bottom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-role
  namespace: bikini-bottom
rules:
  # 讀取 Pod 狀態 + Log
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # 重啟 Deployment（patch annotations）
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-rolebinding
  namespace: bikini-bottom
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: bikini-bottom
roleRef:
  kind: Role
  name: dashboard-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: bikini-bottom
  labels:
    app: dashboard
    type: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        type: service
    spec:
      serviceAccountName: dashboard
      containers:
        - name: dashboard
          image: bikini-bottom/dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          env:
            - name: K8S_NAMESPACE
              value: "bikini-bottom"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: dashboard-secrets
                  key: SESSION_SECRET
            - name: USERS_FILE
              value: "/etc/dashboard/users.json"
          volumeMounts:
            - name: users-config
              mountPath: /etc/dashboard
              readOnly: true
            - name: agents-data
              mountPath: /data/agents
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /login
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /login
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: users-config
          configMap:
            name: dashboard-users
        - name: agents-data
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: bikini-bottom
  labels:
    app: dashboard
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30080
