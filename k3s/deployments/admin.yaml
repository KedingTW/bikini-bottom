apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: bikini-bottom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-role
  namespace: bikini-bottom
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-rolebinding
  namespace: bikini-bottom
subjects:
  - kind: ServiceAccount
    name: admin
    namespace: bikini-bottom
roleRef:
  kind: Role
  name: admin-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: bikini-bottom
  labels:
    app: admin
    type: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        type: service
    spec:
      serviceAccountName: admin
      containers:
        - name: admin
          image: bikini-bottom/admin:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          env:
            - name: K8S_NAMESPACE
              value: "bikini-bottom"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: dashboard-secrets
                  key: SESSION_SECRET
            - name: USERS_FILE
              value: "/etc/admin/users.json"
            - name: DIST_DIR
              value: "/srv/dist"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: OPENAI_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: OPENAI_ADMIN_KEY
            - name: OPENAI_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: OPENAI_ORG_ID
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: admin-discord-secrets
                  key: DISCORD_BOT_TOKEN_KAREN
            - name: DISCORD_GUILD_ID
              valueFrom:
                secretKeyRef:
                  name: admin-discord-secrets
                  key: DISCORD_GUILD_ID
          volumeMounts:
            - name: users-config
              mountPath: /etc/admin
              readOnly: true
            - name: agents-data
              mountPath: /data/agents
            - name: admin-src
              mountPath: /app
              subPath: backend
              readOnly: true
            - name: admin-dist
              mountPath: /srv/dist
              readOnly: true
            - name: metrics-data
              mountPath: /data/metrics
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /login
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /login
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: users-config
          configMap:
            name: dashboard-users
        - name: agents-data
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents
            type: Directory
        - name: admin-src
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/services/admin
            type: Directory
        - name: admin-dist
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/services/admin/dist
            type: Directory
        - name: metrics-data
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/services/admin/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: bikini-bottom
  labels:
    app: admin
spec:
  type: NodePort
  selector:
    app: admin
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30080
