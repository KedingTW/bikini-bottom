apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: bikini-bottom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-role
  namespace: bikini-bottom
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-rolebinding
  namespace: bikini-bottom
subjects:
  - kind: ServiceAccount
    name: admin
    namespace: bikini-bottom
roleRef:
  kind: Role
  name: admin-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: bikini-bottom
  labels:
    app: admin
    type: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        type: service
    spec:
      serviceAccountName: admin
      # Deploy 頁面要呼叫 host 的 docker / k3s containerd，需用 host 的 docker group GID
      securityContext:
        supplementalGroups: [984]  # docker group on host
      containers:
        - name: admin
          image: bikini-bottom/admin:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          env:
            - name: K8S_NAMESPACE
              value: "bikini-bottom"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: dashboard-secrets
                  key: SESSION_SECRET
            - name: DIST_DIR
              value: "/srv/dist"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: OPENAI_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: OPENAI_ADMIN_KEY
            - name: OPENAI_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: gary-secrets
                  key: OPENAI_ORG_ID
            - name: DISCORD_ADMIN_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: admin-discord-secrets
                  key: DISCORD_ADMIN_BOT_TOKEN
            - name: DISCORD_GUILD_ID
              valueFrom:
                secretKeyRef:
                  name: admin-discord-secrets
                  key: DISCORD_GUILD_ID
            - name: MYSQL_HOST
              value: "admin-mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: admin-mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: admin-mysql-secret
                  key: MYSQL_DATABASE
          volumeMounts:
            - name: agents-data
              mountPath: /data/agents
            - name: admin-src
              mountPath: /app
              subPath: backend
              readOnly: true
            - name: admin-dist
              mountPath: /srv/dist
              readOnly: true
            - name: metrics-data
              mountPath: /data/metrics
            - name: repo-data
              mountPath: /data/repo
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: containerd-sock
              mountPath: /run/k3s/containerd/containerd.sock
            - name: shared-skills
              mountPath: /opt/skills
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /login
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /login
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: agents-data
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/agents
            type: Directory
        - name: admin-src
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/services/admin
            type: Directory
        - name: admin-dist
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/services/admin/dist
            type: Directory
        - name: metrics-data
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/services/admin/data
            type: DirectoryOrCreate
        - name: repo-data
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom
            type: Directory
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: containerd-sock
          hostPath:
            path: /run/k3s/containerd/containerd.sock
            type: Socket
        - name: shared-skills
          hostPath:
            path: /home/kdprogramer/Projects/bikini-bottom/shared/skills
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: bikini-bottom
  labels:
    app: admin
spec:
  type: ClusterIP
  selector:
    app: admin
  ports:
    - port: 8501
      targetPort: 8501
