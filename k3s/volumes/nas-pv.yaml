# NAS 使用 hostPath（因為已經 mount 到 /mnt/nas 了）
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nas-pv
  labels:
    type: nas
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  hostPath:
    path: /mnt/nas
    type: Directory
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nas-pvc
  namespace: bikini-bottom
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nas-pv
  resources:
    requests:
      storage: 100Gi
