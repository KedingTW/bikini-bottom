<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 比奇堡團隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { ocean: { 900: '#0a1628', 800: '#0f1932', 700: '#1a2744' } } } } }
    </script>
    <style>
        body { background: #0a1628 url('/bg-pineapple.png') center center / cover no-repeat fixed; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">
    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <img src="/header.png" alt="Logo" class="h-10 mx-auto mb-4">
            <h1 class="text-xl font-semibold">比奇堡團隊管理後台</h1>
            <p class="text-sm text-white/60 mt-1">請輸入員工編號登入</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="/login" class="bg-[rgba(15,25,45,0.85)] backdrop-blur-lg rounded-xl p-8 border border-white/10 shadow-2xl">
            {% if error %}
            <div class="mb-4 px-4 py-2.5 rounded-lg bg-red-500/20 text-red-300 text-sm text-center">{{ error }}</div>
            {% endif %}

            <div class="mb-5">
                <label class="block text-sm text-white/70 mb-1.5">員工編號</label>
                <input type="text" name="username" required autofocus
                    class="w-full px-4 py-2.5 rounded-lg bg-ocean-800 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:border-cyan-400/60 transition"
                    placeholder="例：11021395">
            </div>

            <div class="mb-6">
                <label class="block text-sm text-white/70 mb-1.5">密碼</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2.5 rounded-lg bg-ocean-800 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:border-cyan-400/60 transition"
                    placeholder="輸入密碼">
            </div>

            <button type="submit"
                class="w-full py-2.5 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-medium transition">
                登入
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <img src="/footer.png" alt="Footer" class="h-8 mx-auto opacity-60">
        </div>
    </div>
</body>
</html>
