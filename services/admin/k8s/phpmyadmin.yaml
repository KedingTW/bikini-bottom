apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-phpmyadmin
  namespace: bikini-bottom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-phpmyadmin
  template:
    metadata:
      labels:
        app: admin-phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin:5
          env:
            - name: PMA_HOST
              value: "admin-mysql"
            - name: PMA_PORT
              value: "3306"
            - name: PMA_ABSOLUTE_URI
              value: "http://13.193.102.165/pma/"
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: admin-phpmyadmin
  namespace: bikini-bottom
spec:
  selector:
    app: admin-phpmyadmin
  ports:
    - port: 80
      targetPort: 80
