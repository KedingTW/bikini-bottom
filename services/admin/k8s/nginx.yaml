apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-nginx-conf
  namespace: bikini-bottom
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Admin 後台（目前跑在 port 8501）
        location / {
            proxy_pass http://admin:8501;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # phpMyAdmin
        location /pma/ {
            proxy_pass http://admin-phpmyadmin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-nginx
  namespace: bikini-bottom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-nginx
  template:
    metadata:
      labels:
        app: admin-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              hostPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: nginx-conf
          configMap:
            name: admin-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: admin-nginx
  namespace: bikini-bottom
spec:
  type: ClusterIP
  selector:
    app: admin-nginx
  ports:
    - port: 80
      targetPort: 80
