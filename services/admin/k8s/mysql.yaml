apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: admin-mysql-pvc
  namespace: bikini-bottom
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# ⚠️ Secret 不在 repo 中管理，部署前需手動建立：
# kubectl create secret generic admin-mysql-secret \
#   --namespace=bikini-bottom \
#   --from-literal=MYSQL_ROOT_PASSWORD=<root密碼> \
#   --from-literal=MYSQL_DATABASE=admin_dashboard \
#   --from-literal=MYSQL_USER=admin \
#   --from-literal=MYSQL_PASSWORD=<使用者密碼>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-mysql
  namespace: bikini-bottom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-mysql
  template:
    metadata:
      labels:
        app: admin-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          envFrom:
            - secretRef:
                name: admin-mysql-secret
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: admin-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: admin-mysql
  namespace: bikini-bottom
spec:
  selector:
    app: admin-mysql
  ports:
    - port: 3306
      targetPort: 3306
