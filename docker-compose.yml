# рҹҸқпёҸ жҜ”еҘҮе Ўй–ӢзҷјеңҳйҡҠ
# е•ҹеӢ•: docker compose up -d --build
# еҒңжӯў: docker compose down
# зңӢ logs: docker compose logs -f bob
# жӣҙж–° OpenAB: docker compose build --pull && docker compose up -d

# в”Җв”Җв”Җ е…ұз”ЁиЁӯе®ҡ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # в”Җв”Җв”Җ AI и§’иүІ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  bob:
    build: .
    container_name: bob
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_BOB}
      - KIRO_API_KEY=${KIRO_API_KEY_BOB}
      - GIT_AUTHOR_NAME=жө·з¶ҝеҜ¶еҜ¶ (SpongeBob)
      - GIT_COMMITTER_NAME=жө·з¶ҝеҜ¶еҜ¶ (SpongeBob)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/bob/config.toml:/etc/openab/config.toml:ro
      - ./agents/bob:/home/agent

  patrick:
    build: .
    container_name: patrick
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_PATRICK}
      - KIRO_API_KEY=${KIRO_API_KEY_PATRICK}
      - GIT_AUTHOR_NAME=жҙҫеӨ§жҳҹ (Patrick)
      - GIT_COMMITTER_NAME=жҙҫеӨ§жҳҹ (Patrick)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/patrick/config.toml:/etc/openab/config.toml:ro
      - ./agents/patrick:/home/agent

  puff:
    build: .
    container_name: puff
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_PUFF}
      - KIRO_API_KEY=${KIRO_API_KEY_PUFF}
      - GIT_AUTHOR_NAME=жіЎиҠҷиҖҒеё« (Mrs. Puff)
      - GIT_COMMITTER_NAME=жіЎиҠҷиҖҒеё« (Mrs. Puff)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/puff/config.toml:/etc/openab/config.toml:ro
      - ./agents/puff:/home/agent

  squidward:
    build: .
    container_name: squidward
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_SQUIDWARD}
      - KIRO_API_KEY=${KIRO_API_KEY_SQUIDWARD}
      - GIT_AUTHOR_NAME=з« йӯҡе“Ҙ (Squidward)
      - GIT_COMMITTER_NAME=з« йӯҡе“Ҙ (Squidward)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/squidward/config.toml:/etc/openab/config.toml:ro
      - ./agents/squidward:/home/agent

  sandy:
    build: .
    container_name: sandy
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_SANDY}
      - KIRO_API_KEY=${KIRO_API_KEY_SANDY}
      - GIT_AUTHOR_NAME=зҸҠиҝӘ (Sandy)
      - GIT_COMMITTER_NAME=зҸҠиҝӘ (Sandy)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
      - RUST_LOG=openab=debug
    volumes:
      - ./agents/sandy/config.toml:/etc/openab/config.toml:ro
      - ./agents/sandy:/home/agent

  # в”Җв”Җв”Җ WeCom BotпјҲйҖҸйҒҺ Gateway йҖЈжҺҘдјҒжҘӯеҫ®дҝЎпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  wecom-bot:
    build: .
    container_name: wecom-bot
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - KIRO_API_KEY=${KIRO_API_KEY_WECOM_BOT}
      - GIT_AUTHOR_NAME=WeCom Bot
      - GIT_COMMITTER_NAME=WeCom Bot
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/wecom-bot/config.toml:/etc/openab/config.toml:ro
      - ./agents/wecom-bot:/home/agent
    depends_on:
      - gateway

  # в”Җв”Җв”Җ OpenAB GatewayпјҲWeCom webhook жҺҘж”¶еҷЁпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  gateway:
    image: ghcr.io/openabdev/openab-gateway:latest
    container_name: gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env

  # в”Җв”Җв”Җ зҚЁз«ӢжңҚеӢҷ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  slash-bot:
    build: ./services/slash-bot
    container_name: slash-bot
    restart: unless-stopped
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_GARY}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - SLASH_BOT_CHANNEL_ID=${SLASH_BOT_CHANNEL_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=us-east-1
